<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加到主屏幕 - 四级英语学习</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      margin-bottom: 25px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .step-number {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 15px;
      flex-shrink: 0;
    }
    .step-content h3 {
      color: #333;
      margin-bottom: 5px;
      font-size: 16px;
    }
    .step-content p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }
    .iphone-icon, .android-icon {
      width: 100%;
      padding: 20px;
      background: #f0f0f0;
      border-radius: 12px;
      margin-top: 30px;
    }
    .device-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon-apple, .icon-android {
      font-size: 24px;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      margin-top: 30px;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .check-mark {
      color: #4caf50;
      font-size: 50px;
      margin-bottom: 20px;
    }
    .success-message {
      text-align: center;
    }
    .success-message h1 {
      color: #4caf50;
    }
    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="content">
    <h1>📱 添加到主屏幕</h1>
    <p class="subtitle">将四级英语学习添加到手机桌面，像 App 一样使用</p>

    <div class="step">
      <div class="step-number">1</div>
      <div class="step-content">
        <h3>iPhone / iPad 用户</h3>
        <p>1. 打开 Safari 浏览器<br>2. 点击底部 <strong>分享按钮</strong> ⬆️<br>3. 向下滚动，点击 <strong>"添加到主屏幕"</strong><br>4. 点击右上角 <strong>"添加"</strong></p>
      </div>
    </div>

    <div class="step">
      <div class="step-number">2</div>
      <div class="step-content">
        <h3>Android 用户</h3>
        <p>1. 打开 Chrome 浏览器<br>2. 点击右上角 <strong>⋮</strong> 菜单<br>3. 点击 <strong>"添加到主屏幕"</strong><br>4. 或点击底部提示栏 <strong>"安装"</strong></p>
      </div>
    </div>

    <div class="step">
      <div class="step-number">3</div>
      <div class="step-content">
        <h3>使用 App</h3>
        <p>添加后，在主屏幕点击图标即可直接打开应用，无需打开浏览器！</p>
      </div>
    </div>

    <a href="/" class="btn">返回应用</a>
  </div>

  <script>
    // 检测是否已安装
    if (window.matchMedia('(display-mode: standalone)').matches) {
      document.getElementById('content').innerHTML = `
        <div class="success-message">
          <div class="check-mark">✓</div>
          <h1>已安装！</h1>
          <p class="subtitle">您已在主屏幕上添加了此应用</p>
          <p style="color: #666; margin-top: 20px;">点击主屏幕上的图标即可打开应用</p>
          <a href="/" class="btn">打开应用</a>
        </div>
      `;
    }
  </script>
</body>
</html>
